<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін Панель - STRIVE</title>
    <link rel="stylesheet" href="style.css"> <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="container nav-wrapper">
        <div class="logo">STRIVE <span>Адмін Панель</span></div>
        <a href="search.html" style="text-decoration: none; font-weight: bold; color: var(--brand-color);">← Назад</a>
    </div>
</nav>

<div class="container admin-page">
    
    <div class="admin-header">
        <h2>Користувачі</h2>
        <button class="add-btn" onclick="openUserModal()">+ Додати користувача</button>
    </div>
    <div style="overflow-x: auto;">
        <table class="admin-table" id="usersTable">
            <thead>
                <tr>
                    <th>Логін</th>
                    <th>Email</th>
                    <th>Роль</th>
                    <th>Дії</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="admin-header">
        <h2>Квартири</h2>
        <button class="add-btn" onclick="openAptModal()">+ Додати квартиру</button>
    </div>
    <div style="overflow-x: auto;">
        <table class="admin-table" id="aptsTable">
            <thead>
                <tr>
                    <th>Фото</th>
                    <th>Назва</th>
                    <th>Ціна</th>
                    <th>Адреса</th>
                    <th>Дії</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="admin-header">
        <h2>Повідомлення (Контакти)</h2>
    </div>
    <div style="overflow-x: auto;">
        <table class="admin-table" id="messagesTable">
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Ім'я</th>
                    <th>Email</th>
                    <th>Повідомлення</th>
                    <th>Дії</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="userModal">
    <div class="auth-modal">
        <button class="close-btn" onclick="closeModal('userModal')">&#10006;</button>
        <h2 id="userModalTitle">Користувач</h2>
        <div class="auth-form">
            <input type="hidden" id="oldUserLogin">
            <input type="text" id="userLogin" placeholder="Логін">
            <input type="email" id="userEmail" placeholder="Email">
            <input type="text" id="userPassword" placeholder="Пароль">
            <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                <input type="checkbox" id="userIsAdmin"> Адміністратор
            </label>
            <button class="auth-action-btn primary" onclick="saveUser()">Зберегти</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="aptModal">
    <div class="auth-modal">
        <button class="close-btn" onclick="closeModal('aptModal')">&#10006;</button>
        <h2 id="aptModalTitle">Квартира</h2>
        <div class="auth-form">
            <input type="hidden" id="aptId">
            <input type="text" id="aptTitle" placeholder="Заголовок">
            <input type="text" id="aptAddress" placeholder="Адреса">
            <input type="number" id="aptPrice" placeholder="Ціна ($)">
            <input type="text" id="aptImage" placeholder="URL Фото">
            <button class="auth-action-btn primary" onclick="saveApt()">Зберегти</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script src="admin.js"></script>
</body>
</html>
