<head>
    <link rel="stylesheet" href="style.css">     <link rel="stylesheet" href="apartment.css"> </head>
<body>
<nav class="navbar">
    <div class="container nav-wrapper">
        <div class="logo">STRIVE <span>Оренда житла</span></div>
        
        <div id="adminControls" class="admin-controls" style="display: none;">
            <span>Режим редагування</span>
            <label class="switch">
                <input type="checkbox" id="editModeToggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="nav-links" id="navAuthBlock">
            <a href="#">Головна</a>
            <a href="search.html">Пошук</a>
            <a href="#" id="contactsBtn">Контакти</a>
            <div id="userMenuWrapper" class="user-menu-wrapper">
                <a href="#" id="loginBtn">Увійти</a>
                
                <div id="userDropdown" class="dropdown-panel profile-dropdown">
                    <div class="sort-option">Профіль</div>
                    <div class="sort-option">Настройки</div>

                    <div id="adminPanelLink" class="sort-option" style="display: none;" onclick="window.location.href='admin.html'">Адмін Панель</div>
    
                    <hr>
                    <div class="sort-option logout-opt" id="logoutBtn">Вийти</div>
                </div>
            </div>
        </div>
    </div>
</nav>

<header class="header">
    <div class="container">
        <div class="header-content">
            <h1>Пошук квартир</h1>
    </div>
    <div class="modal-overlay" id="authOverlay">
        <div class="auth-modal" id="authModal">
            <button class="close-btn" id="closeAuth">&#10006;</button>
            <h2>Авторизація</h2>
            <div class="auth-form">
                <input type="email" id="authEmail" placeholder="Пошта" required>
                <input type="text" id="authLogin" placeholder="Логін" required>
                <input type="password" id="authPassword" placeholder="Пароль" required>
                <div class="auth-buttons">
                    <button type="button" id="registerBtn" class="auth-action-btn">Зареєструватися</button>
                    <button type="button" id="signInBtn" class="auth-action-btn primary">Увійти</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="contactOverlay">
        <div class="auth-modal" id="contactModal">
            <button class="close-btn" id="closeContact">&#10006;</button>
            <h2>Зв'язатися з нами</h2>
            <div class="auth-form">
                <input type="text" id="contactName" placeholder="Ваше ім'я" required>
                <input type="email" id="contactEmail" placeholder="Ваша пошта (напр. test@email.com)" required>
                <textarea id="contactMessage" placeholder="Ваше повідомлення..." rows="4" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: inherit; resize: vertical; margin-bottom: 15px; outline: none;"></textarea>
                <button type="button" id="sendContactBtn" class="auth-action-btn primary">Відправити</button>
            </div>
        </div>
    </div>
</header>

    <main class="container apt-page-main">
        <div id="mainAptContent"></div>
        
        <section class="recommendations">
            <h2>Схожі варіанти</h2>
            <div id="recommendGrid" class="recommend-grid"></div>
        </section>
    </main>
