<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRIVE — Пошук квартир</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="container nav-wrapper">
        <div class="logo">STRIVE <span>Оренда житла</span></div>
        
        <div id="adminControls" class="admin-controls" style="display: none;">
            <span>Режим редагування</span>
            <label class="switch">
                <input type="checkbox" id="editModeToggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="nav-links" id="navAuthBlock">
            <a href="#">Головна</a>
            <a href="#">Пошук</a>
            <a href="#">Контакти</a>
            <div id="userMenuWrapper" class="user-menu-wrapper">
                <a href="#" id="loginBtn">Увійти</a>
                
                <div id="userDropdown" class="dropdown-panel profile-dropdown">
                    <div class="sort-option">Профіль</div>
                    <div class="sort-option">Настройки</div>
                    <hr>
                    <div class="sort-option logout-opt" id="logoutBtn">Вийти</div>
                </div>
            </div>
        </div>
    </div>
</nav>

<header class="header">
    <div class="container">
        <div class="header-content">
            <h1>Пошук квартир</h1>
            
            <div class="controls-row">
                <div class="filter-buttons-left">
                    <div class="filter-wrapper">
                        <button id="openFilters" class="pill-btn">
                            <svg class="icon-settings" viewBox="0 0 24 24"><path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4V7H21V5h-6V3h-2v6h2z"></path></svg>
                            Фільтри
                        </button>
                        
                        <div id="filterPanel" class="dropdown-panel price-panel">
                            <h3>Кількість кімнат</h3>
                            <div class="rooms-row">
                                <button class="room-btn">1</button>
                                <button class="room-btn">2</button>
                                <button class="room-btn">3</button>
                                <button class="room-btn">4</button>
                            </div>
                            <h3>Ціна</h3>
                            <div class="filter-row">
                                <input type="number" id="priceFrom" placeholder="Від $">
                                <input type="number" id="priceTo" placeholder="До $">
                            </div>
                            <button id="applyFilters" class="apply-btn">Застосувати</button>
                        </div>
                    </div>
                </div>

                <div class="sort-wrapper">
                    <span class="sort-label">Сортувати</span>
                    <div class="sort-select-input" id="openSort">
                        <span id="currentSort">За новизною</span>
                        <svg class="icon-arrow" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"></path></svg>
                    </div>
                    <div id="sortPanel" class="dropdown-panel sort-dropdown">
                        <div class="sort-option" data-sort="new">За новизною</div>
                        <div class="sort-option" data-sort="cheap">Від дешевшої</div>
                        <div class="sort-option" data-sort="expensive">Від дорожчої</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="authOverlay">
        <div class="auth-modal" id="authModal">
            <button class="close-btn" id="closeAuth">&#10006;</button>
            <h2>Авторизація</h2>
            <div class="auth-form">
                <input type="email" id="authEmail" placeholder="Пошта" required>
                <input type="text" id="authLogin" placeholder="Логін" required>
                <input type="password" id="authPassword" placeholder="Пароль" required>
                <div class="auth-buttons">
                    <button type="button" id="registerBtn" class="auth-action-btn">Зареєструватися</button>
                    <button type="button" id="signInBtn" class="auth-action-btn primary">Увійти</button>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="container">
    <section id="apartments" class="grid"></section>
</main>

<script src="script.js"></script>
</body>
</html>
